<script>
// ===============================================
// STORAGE — CONEXIÓN A POSTGRESQL VIA API REST
// (de UltimoDB.html — reemplaza el window.storage
//  básico que tenía proyecto.htm)
// shared=true  → persiste en PostgreSQL (visible para todos)
// shared=false → persiste en localStorage (solo este dispositivo)
// ===============================================
window.storage = {
  async get(key, shared = true) {
    if (!shared) {
      const raw = localStorage.getItem(key);
      return raw === null ? { value: null } : { value: JSON.parse(raw) };
    }
    try {
      const res = await fetch(`/api/storage/${encodeURIComponent(key)}`);
      return res.ok ? await res.json() : { value: null };
    } catch (e) {
      console.error(`[Storage GET] ${key} falló`, e);
      return { value: null };
    }
  },
  async set(key, value, shared = true) {
    if (!shared) {
      if (value == null) localStorage.removeItem(key);
      else localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      return;
    }
    try {
      await fetch(`/api/storage/${encodeURIComponent(key)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value })
      });
    } catch (e) {
      console.error(`[Storage SET] ${key} falló`, e);
    }
  },
  async delete(key, shared = true) {
    if (!shared) {
      localStorage.removeItem(key);
      return;
    }
    try {
      await fetch(`/api/storage/${encodeURIComponent(key)}`, { method: 'DELETE' });
    } catch (e) {}
  }
};

// CACHE EN MEMORIA + PERSISTENCIA
// Los datos compartidos (partidos, usuarios, resultados) se
// guardan en PostgreSQL via window.storage (shared=true).
// El usuario activo se guarda en localStorage (shared=false).

const _cache = {
  wc_users: null,
  wc_userdata: null,
  wc_real_results: null,
  wc_config: null,
  wc_designated_admin: null,
  wc_active_user: null,
  _predictions: {}
};

async function _persist(key, value, shared=true) {
  try {
    await window.storage.set(key, JSON.stringify(value), shared);
  } catch(e) { /* fallo silencioso */ }
}

async function _loadAll() {
  const keys = ['wc_users','wc_userdata','wc_real_results','wc_config','wc_designated_admin'];
  for (const k of keys) {
    try {
      const r = await window.storage.get(k, true);
      if (r && r.value != null) {
        _cache[k] = JSON.parse(r.value);
      }
    } catch(e) {}
  }
  try {
    const r = await window.storage.get('wc_active_user', false);
    if (r && r.value != null) _cache.wc_active_user = r.value;
  } catch(e) {}
  const users = _cache.wc_users || [];
  for (const u of users) {
    try {
      const r = await window.storage.get('wc_predictions_'+u, true);
      if (r && r.value != null) _cache._predictions[u] = JSON.parse(r.value);
    } catch(e) {}
  }
}

// ============================================================
// LOCK LOGIC
// ============================================================
function getMatchLockTime(m) {
  const parts = m.date.split('-');
  const year  = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10) - 1;
  const day   = parseInt(parts[2], 10);
  return new Date(year, month, day, 1, 0, 0);
}
function isTimeLocked(m) { return new Date() >= getMatchLockTime(m); }
function hasRealResult(matchId) {
  const r = getRealResults()[matchId];
  return r && r.home !== '' && r.away !== '' && !isNaN(parseInt(r.home)) && !isNaN(parseInt(r.away));
}
function isMatchLocked(m) { return hasRealResult(m.id) || isTimeLocked(m); }
function getLockReason(m) {
  if (hasRealResult(m.id)) return 'result';
  if (isTimeLocked(m))     return 'time';
  return null;
}
function formatLockTime(m) {
  const d = getMatchLockTime(m);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d.getDate()} ${months[d.getMonth()]} 01:00 AM`;
}

// ============================================================
// HELPERS
// ============================================================
function calcScore(pred,real){
  if(!pred||!real||pred.home===''||pred.away===''||real.home===''||real.away==='')return{pts:0,type:'pending'};
  const ph=parseInt(pred.home),pa=parseInt(pred.away),rh=parseInt(real.home),ra=parseInt(real.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra))return{pts:0,type:'pending'};
  if(ph===rh&&pa===ra)return{pts:3,type:'exact'};
  if(Math.sign(ph-pa)===Math.sign(rh-ra))return{pts:1,type:'winner'};
  return{pts:0,type:'miss'};
}
function calcUserScores(u){
  const preds=getPredictions(u),reals=getRealResults();
  let total=0,exact=0,winner=0,miss=0,pending=0,predicted=0;
  MATCHES.forEach(m=>{
    const p=preds[m.id],r=reals[m.id];
    if(p&&p.home!==''&&p.away!=='')predicted++;
    const s=calcScore(p,r);total+=s.pts;
    if(s.type==='exact')exact++;else if(s.type==='winner')winner++;else if(s.type==='miss')miss++;else pending++;
  });
  return{total,exact,winner,miss,pending,predicted};
}
function getAllRanking(){
  return getUsers().map(u=>({name:u,...calcUserScores(u)})).sort((a,b)=>b.total-a.total||b.exact-a.exact||b.winner-a.winner||a.name.localeCompare(b.name));
}
function formatDate(d){
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const parts=d.split('-');
  const dt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  return days[dt.getDay()]+' '+dt.getDate()+' '+months[dt.getMonth()];
}

  const el=document.createElement('div');el.className='notification '+type;el.textContent=msg;

}

function showLoginError(msg){const el=document.getElementById('loginError');if(el){el.textContent=msg;el.style.display='block'}}

function doLogin(){
  const user=(document.getElementById('loginUser').value||'').trim();
  const pass=document.getElementById('loginPass').value||'';
  if(!user){showLoginError('Ingresá tu usuario');return}
  if(!getUsers().includes(user)){showLoginError('Usuario no encontrado');return}
  const ud=getUserData(user);
  if(!ud||ud.password!==pass){showLoginError('Contraseña incorrecta');return}
  currentUser=user;setActiveUser(user);isAdmin=false;activeTab='predictions';render();notify('¡Bienvenido, '+user+'! 🎉');
}

function doRegister(){
  const user=(document.getElementById('regUser').value||'').trim();
  const pass=document.getElementById('regPass').value||'';
  const pass2=document.getElementById('regPass2').value||'';
  if(!user||user.length<2){showLoginError('El usuario debe tener al menos 2 caracteres');return}
  if(!pass||pass.length<3){showLoginError('La contraseña debe tener al menos 3 caracteres');return}
  if(pass!==pass2){showLoginError('Las contraseñas no coinciden');return}
  const users=getUsers();
  if(users.includes(user)){showLoginError('Ese usuario ya existe');return}
  const isFirst=users.length===0;
  users.push(user);saveUsers(users);
  setUserData(user,{password:pass,createdAt:new Date().toISOString()});
  if(isFirst)setDesignatedAdmin(user);
  currentUser=user;setActiveUser(user);isAdmin=false;activeTab='predictions';render();notify('¡Cuenta creada! Bienvenido '+user+' 🎉');
}

function logout(){currentUser=null;setActiveUser(null);isAdmin=false;loginMode='login';render()}

function renderStandings(g,reals){
  const teams=GROUPS[g].map(t=>({name:t,pts:0,w:0,d:0,l:0,gf:0,ga:0,pld:0}));
  MATCHES.filter(m=>m.group===g).forEach(m=>{
    const r=reals[m.id];if(!r||r.home===''||r.away==='')return;
    const hg=parseInt(r.home),ag=parseInt(r.away);if(isNaN(hg)||isNaN(ag))return;
    const ht=teams.find(t=>t.name===m.home),at=teams.find(t=>t.name===m.away);if(!ht||!at)return;
    ht.pld++;at.pld++;ht.gf+=hg;ht.ga+=ag;at.gf+=ag;at.ga+=hg;
    if(hg>ag){ht.w++;ht.pts+=3;at.l++}else if(hg<ag){at.w++;at.pts+=3;ht.l++}else{ht.d++;ht.pts++;at.d++;at.pts++}
  });
  teams.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
  if(!teams.some(t=>t.pld>0))return '';
  let h=`<table class="standings-mini"><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr>`;
  teams.forEach((t,i)=>{h+=`<tr class="${i<2?'qualify':''}"><td>${fl(t.name)} ${t.name}</td><td>${t.pld}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gf-t.ga}</td><td><b>${t.pts}</b></td></tr>`});
  return h+`</table>`;
}

function renderPredictions(el){

  const openMatches=TOTAL_MATCHES-lockedByTime-lockedByResult;
  let nextLock=null;
  MATCHES.forEach(m=>{

  let h=`<div class="section active"><div class="section-title">✏️ Mi Pronóstico</div>

</div>`;
  h+=`<div class="lock-info-box">

🔒 ${lockedByResult} con resultado oficial · ⏰ ${lockedByTime} bloqueados por horario · ✅ ${openMatches} abiertos para pronosticar`;
  if(nextLock){h+=`<br>⏳ <b>Próximo bloqueo:</b> ${fl(nextLock.match.home)} ${nextLock.match.home} vs ${fl(nextLock.match.away)} ${nextLock.match.away} → <b>${formatLockTime(nextLock.match)}</b>`;}
  h+=`</div>`;
  h+=`<div class="filter-bar"><label>Grupo:</label><select onchange="groupFilter=this.value;renderContent()">
<option value="all" ${groupFilter==='all'?'selected':''}>Todos</option>
${Object.keys(GROUPS).map(g=>`<option value="${g}" ${groupFilter===g?'selected':''}>Grupo ${g}</option>`).join('')}
</select></div>`;
  (groupFilter==='all'?Object.keys(GROUPS):[groupFilter]).forEach(g=>{
    const gm=MATCHES.filter(m=>m.group===g);const col=collapsedGroups['p_'+g];
    const gP=gm.filter(m=>preds[m.id]&&preds[m.id].home!==''&&preds[m.id].away!=='').length;
    h+=`<div class="group-card"><div class="group-header">
<span class="group-toggle ${col?'collapsed':''}" onclick="collapsedGroups['p_${g}']=!collapsedGroups['p_${g}'];renderContent()">Grupo ${g} — ${GROUPS[g].map(t=>fl(t)).join(' ')}</span>
<span class="group-badge">${gP}/${gm.length}</span></div>
<div class="group-body ${col?'hidden':''}">`;
    gm.forEach(m=>{
      const p=preds[m.id]||{home:'',away:''};const r=reals[m.id];
      const locked=isMatchLocked(m);const lockReason=getLockReason(m);
      const s=calcScore(p,r);let badge='';
      if(hasRealResult(m.id)){
        if(p.home!==''&&p.away!==''){
          if(s.type==='exact')badge='<span class="match-result-badge badge-exact">+3 Exacto ✓</span>';
          else if(s.type==='winner')badge='<span class="match-result-badge badge-winner">+1 Ganador</span>';
          else badge='<span class="match-result-badge badge-miss">+0</span>';
        }else badge='<span class="match-result-badge badge-miss">Sin pronóstico</span>';
      }else if(lockReason==='time'&&p.home!==''&&p.away!==''){
        badge='<span class="match-result-badge badge-pending">⏰ Enviado</span>';
      }else if(lockReason==='time'){
        badge='<span class="match-result-badge badge-miss">⏰ No enviado</span>';
      }
      const realStr=hasRealResult(m.id)?`<span class="real-result">Real: ${r.home}-${r.away}</span>`:'';
      let lockIcon='';
      if(lockReason==='result')lockIcon='🔒';else if(lockReason==='time')lockIcon='⏰';
      let lockTooltip='';
      if(!locked)lockTooltip=`<span style="font-size:0.6em;color:#27ae60;margin-left:4px">✅ Abierto hasta ${formatLockTime(m)}</span>`;
      h+=`<div class="match-row ${locked?'locked-row':''}${hasRealResult(m.id)?' has-result':''}"><div style="width:100%">

function savePred(input){
  if(input.disabled)return;const mid=input.dataset.match;
  const m=MATCHES.find(x=>x.id===mid);
  if(m&&isMatchLocked(m)){
    const reason=getLockReason(m);
    if(reason==='result')notify('Partido con resultado oficial. Bloqueado.','error');
    else notify('Partido bloqueado por horario (cierre: '+formatLockTime(m)+')','error');
    return;
  }
  let val=input.value.trim();if(val!==''){let n=parseInt(val);if(isNaN(n)||n<0)n=0;if(n>20)n=20;input.value=n;val=n.toString()}
  const preds=getPredictions(currentUser);if(!preds[mid])preds[mid]={home:'',away:''};
  preds[mid][input.dataset.side]=val;savePredictions(currentUser,preds);
  const scores=calcUserScores(currentUser);
  const ub=document.querySelector('.user-bar span');if(ub)ub.innerHTML=`👤 <span class="user-name">${esc(currentUser)}</span> — ${scores.total} pts`;
}

<button class="btn-save" onclick="saveEditUser('${esc(u)}')">💾 Guardar</button>
<button class="btn-cancel" onclick="closeModal()">Cancelar</button>
</div></div></div>`;
}

function saveEditUser(oldName){
  const newName=(document.getElementById('editName').value||'').trim();
  const newPass=document.getElementById('editPass').value||'';
  if(!newName||newName.length<2){notify('Nombre mínimo 2 caracteres','error');return}
  if(!newPass||newPass.length<3){notify('Contraseña mínimo 3 caracteres','error');return}
  const users=getUsers();
  if(newName!==oldName&&users.includes(newName)){notify('Nombre ya existe','error');return}
  const idx=users.indexOf(oldName);if(idx===-1)return;
  users[idx]=newName;saveUsers(users);
  const ud=getUserData(oldName)||{};ud.password=newPass;
  if(newName!==oldName){deleteUserData(oldName);const preds=getPredictions(oldName);savePredictions(newName,preds);deletePredictions(oldName)}
  setUserData(newName,ud);
  if(currentUser===oldName){currentUser=newName;setActiveUser(newName)}
  closeModal();notify(`Usuario actualizado: ${newName}`);renderContent();
}

function resetUser(u){
  if(!confirm(`¿Borrar pronósticos desbloqueados de "${u}"?`))return;
  const preds=getPredictions(u);let c=0;
  MATCHES.forEach(m=>{if(!hasRealResult(m.id)&&preds[m.id]){delete preds[m.id];c++}});
  savePredictions(u,preds);notify(`${c} pronósticos borrados`,'info');renderContent();
}

function deleteUser(u){
  if(!confirm(`¿Eliminar "${u}" y todos sus datos?`))return;
  const users=getUsers().filter(x=>x!==u);saveUsers(users);deleteUserData(u);deletePredictions(u);
  if(currentUser===u){currentUser=null;setActiveUser(null);isAdmin=false;render();return}
  notify(`"${u}" eliminado`,'info');renderContent();
}

function addUserAdmin(){
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal-box"><button class="close-btn" onclick="closeModal()">✕</button>
<h3>➕ Agregar Usuario</h3>
<label>Nombre:</label><input type="text" id="newUserName" maxlength="20" placeholder="Nombre de usuario">
<label>Contraseña:</label><input type="text" id="newUserPass" maxlength="30" placeholder="Contraseña">
<div class="modal-actions"><button class="btn-save" onclick="saveNewUser()">Crear</button>
<button class="btn-cancel" onclick="closeModal()">Cancelar</button></div></div></div>`;
}

function saveNewUser(){
  const name=(document.getElementById('newUserName').value||'').trim();
  const pass=document.getElementById('newUserPass').value||'';
  if(!name||name.length<2){notify('Mínimo 2 caracteres','error');return}
  if(!pass||pass.length<3){notify('Contraseña mínimo 3 caracteres','error');return}
  if(getUsers().includes(name)){notify('Ya existe','error');return}
  const users=getUsers();users.push(name);saveUsers(users);
  setUserData(name,{password:pass,createdAt:new Date().toISOString()});
  closeModal();notify(`"${name}" creado ✅`);renderContent();
}

function deleteAllUsers(){
  if(!confirm('⚠️ ¿Eliminar TODOS los usuarios?'))return;if(!confirm('¿Seguro?'))return;
  getUsers().forEach(u=>{deletePredictions(u);deleteUserData(u)});saveUsers([]);
  currentUser=null;setActiveUser(null);isAdmin=false;notify('Todos eliminados','info');render();
}

function handleLogoUpload(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){document.getElementById('cfgLogo').value=e.target.result;notify('Logo cargado ✅')};reader.readAsDataURL(file)}

// --- EXPORT/IMPORT ---
function renderAdminExport(){
  return `<div class="export-section">
<h4>📤 Exportar Datos</h4>
<p>Descargá toda la información del sistema.</p>
<button class="save-btn" onclick="exportTXT()">📄 TXT</button>
<button class="save-btn" onclick="exportXLS()">📊 CSV/XLS</button>
<button class="info-btn" onclick="exportJSON()">💾 JSON (respaldo)</button>
</div>
<div class="export-section" style="margin-top:15px">
<h4>📥 Importar Datos</h4>
<p>⚠️ Reemplaza todos los datos actuales.</p>
<div class="file-input-wrapper">
<button class="info-btn">📂 Seleccionar JSON</button>
<input type="file" accept=".json" onchange="importJSON(this)">
</div></div>`;
}

function exportJSON(){
  const data={};
  ['wc_users','wc_userdata','wc_real_results','wc_config'].forEach(k=>{if(_cache[k]!=null)data[k]=_cache[k]});
  if(_cache.wc_designated_admin)data['wc_designated_admin']=_cache.wc_designated_admin;
  getUsers().forEach(u=>{if(_cache._predictions[u])data['wc_predictions_'+u]=_cache._predictions[u]});
  downloadFile('prode_mundial_backup.json',JSON.stringify(data,null,2),'application/json');notify('JSON exportado ✅');
}

function importJSON(input){
  const file=input.files[0];if(!file)return;
  if(!confirm('⚠️ Esto REEMPLAZARÁ todos los datos. ¿Continuar?'))return;
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const data=JSON.parse(e.target.result);
      getUsers().forEach(u=>deletePredictions(u));
      if(data.wc_users){_cache.wc_users=data.wc_users;_persist('wc_users',data.wc_users)}
      if(data.wc_userdata){_cache.wc_userdata=data.wc_userdata;_persist('wc_userdata',data.wc_userdata)}
      if(data.wc_real_results){_cache.wc_real_results=data.wc_real_results;_persist('wc_real_results',data.wc_real_results)}
      if(data.wc_config){_cache.wc_config=data.wc_config;_persist('wc_config',data.wc_config)}
      if(data.wc_designated_admin){_cache.wc_designated_admin=data.wc_designated_admin;_persist('wc_designated_admin',data.wc_designated_admin)}
      _cache._predictions={};
      Object.keys(data).forEach(k=>{if(k.startsWith('wc_predictions_')){const u=k.replace('wc_predictions_','');_cache._predictions[u]=data[k];_persist(k,data[k])}});
      applyConfig(getConfig());currentUser=null;setActiveUser(null);isAdmin=false;
      notify('✅ Datos importados. Iniciá sesión nuevamente.');render();
    }catch(err){notify('Error: '+err.message,'error')}
  };
  reader.readAsText(file);
}

function exportTXT(){
  const users=getUsers();const reals=getRealResults();const ranking=getAllRanking();
  let txt='=== PRODE MUNDIAL 2026 - REPORTE ===\nFecha: '+new Date().toLocaleString()+'\n\n--- RANKING ---\nPos | Usuario         | Pts | Exactos | Ganador | Fallados | Pronóst.\n'+'-'.repeat(75)+'\n';
  ranking.forEach((u,i)=>{txt+=`${(i+1+'').padStart(3)} | ${u.name.padEnd(15)} | ${(u.total+'').padStart(3)} | ${(u.exact+'').padStart(7)} | ${(u.winner+'').padStart(7)} | ${(u.miss+'').padStart(8)} | ${u.predicted}/${TOTAL_MATCHES}\n`});
  txt+='\n--- RESULTADOS OFICIALES ---\n';
  MATCHES.forEach(m=>{const r=reals[m.id];txt+=`${m.date} ${m.time} | ${m.home} vs ${m.away} | ${r&&r.home!==''?r.home+'-'+r.away:'Pendiente'}\n`});
  txt+='\n--- PRONÓSTICOS ---\n';
  users.forEach(u=>{const preds=getPredictions(u);txt+=`\n[${u}]\n`;MATCHES.forEach(m=>{const p=preds[m.id];txt+=`  ${m.home} vs ${m.away}: ${p&&p.home!==''?p.home+'-'+p.away:'—'}\n`})});
  downloadFile('prode_mundial_reporte.txt',txt,'text/plain');notify('TXT exportado ✅');
}

function exportXLS(){
  const users=getUsers();const reals=getRealResults();const ranking=getAllRanking();
  let csv='\uFEFF';
  csv+='RANKING\nPosición;Usuario;Puntos;Exactos;Ganador;Fallados;Pronósticos\n';
  ranking.forEach((u,i)=>{csv+=`${i+1};${u.name};${u.total};${u.exact};${u.winner};${u.miss};${u.predicted}/${TOTAL_MATCHES}\n`});
  csv+='\nRESULTADOS OFICIALES\nFecha;Hora;Local;Visitante;Resultado\n';
  MATCHES.forEach(m=>{const r=reals[m.id];csv+=`${m.date};${m.time};${m.home};${m.away};${r&&r.home!==''?r.home+'-'+r.away:'Pendiente'}\n`});
  csv+='\nPRONÓSTICOS\nUsuario;Partido;Pronóstico;Real;Puntos\n';
  users.forEach(u=>{const preds=getPredictions(u);MATCHES.forEach(m=>{const p=preds[m.id]||{home:'',away:''};const r=reals[m.id];const s=calcScore(p,r);
    csv+=`${u};${m.home} vs ${m.away};${p.home!==''?p.home+'-'+p.away:'—'};${r&&r.home!==''?r.home+'-'+r.away:'—'};${s.pts}\n`})});
  downloadFile('prode_mundial_datos.csv',csv,'text/csv');notify('CSV exportado ✅');
}

function downloadFile(name,content,type){
  const blob=new Blob([content],{type:type+';charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
