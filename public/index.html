<!DOCTYPE html>
<html lang="es" style="--primary: #1a472a; --primary-light: #2d6a4f; --primary-dark: #0d2818; --accent: #d4a017; --accent-light: #f0c040;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Fixture Mundial 2026 - Prode Empresarial</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#1a472a;--primary-light:#2d6a4f;--primary-dark:#0d2818;--accent:#d4a017;--accent-light:#f0c040;--white:#fff;--gray:#f0f0f0;--gray-dark:#333;--red:#c0392b;--blue:#2980b9;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes bounceIn{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:1}}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,var(--primary-dark) 100%);min-height:100vh;color:var(--gray-dark)}
        .app-container{max-width:900px;margin:0 auto;min-height:100vh;background:rgba(255,255,255,0.97);box-shadow:0 0 40px rgba(0,0,0,0.3)}
        .app-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:var(--white);padding:15px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,0.3)}
        .app-header h1{font-size:1.3em;margin-bottom:2px;text-shadow:1px 1px 3px rgba(0,0,0,0.3)}
        .app-header .subtitle{font-size:0.75em;color:var(--accent-light);letter-spacing:2px;text-transform:uppercase}
        .header-logo{width:52px;height:52px;border-radius:50%;object-fit:cover;margin-bottom:5px;border:2px solid var(--accent);background:white;box-shadow:0 2px 8px rgba(0,0,0,0.25)}
        .user-bar{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:0.85em;padding:5px 10px;background:rgba(0,0,0,0.2);border-radius:20px}
        .user-bar .user-name{color:var(--accent-light);font-weight:bold}
        .user-bar button{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:3px 12px;border-radius:15px;cursor:pointer;font-size:0.8em;transition:all .3s}
        .user-bar button:hover{background:rgba(255,255,255,0.3)}
        .nav-tabs{display:flex;background:var(--primary-dark);overflow-x:auto}
        .nav-tabs button{flex:1;padding:12px 5px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-size:0.72em;cursor:pointer;transition:all .3s;border-bottom:3px solid transparent;white-space:nowrap}
        .nav-tabs button.active{color:var(--accent-light);border-bottom-color:var(--accent);background:rgba(255,255,255,0.05)}
        .nav-tabs button:hover{color:white;background:rgba(255,255,255,0.05)}
        .nav-tabs .tab-icon{display:block;font-size:1.3em;margin-bottom:2px}
        .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;text-align:center;background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:white}
        .login-screen .logo-area{margin-bottom:15px}
        .login-screen .logo-emoji{font-size:4em;animation:bounceIn .8s}
        .login-screen h1{font-size:1.8em;margin-bottom:5px;text-shadow:2px 2px 5px rgba(0,0,0,.3)}
        .login-screen .tagline{color:var(--accent-light);margin-bottom:25px;font-size:0.85em;letter-spacing:3px;text-transform:uppercase}
        .login-box{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:30px;width:100%;max-width:380px;border:1px solid rgba(255,255,255,.15)}
        .login-box h2{margin-bottom:20px;font-size:1.05em;color:rgba(255,255,255,.9)}
        .login-box input{width:100%;padding:13px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;font-size:0.95em;margin-bottom:12px;transition:all .3s;outline:none}
        .login-box input:focus{border-color:var(--accent);background:rgba(255,255,255,.15)}
        .login-box .btn-primary{width:100%;padding:13px;border:none;border-radius:12px;font-size:1em;font-weight:bold;cursor:pointer;transition:all .3s;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:var(--primary-dark)}
        .login-box .btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(212,160,23,.4)}
        .login-box .toggle-link{color:var(--accent-light);cursor:pointer;font-size:0.8em;margin-top:10px;display:inline-block;text-decoration:underline}
        .section{display:none;padding:15px;animation:fadeIn .4s}
        .section.active{display:block}
        .section-title{font-size:1.15em;font-weight:bold;color:var(--primary);margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:8px}
        .notification{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;color:white;font-weight:bold;z-index:1000;animation:bounceIn .5s;box-shadow:0 4px 15px rgba(0,0,0,.2);max-width:350px}
        .notification.success{background:#27ae60}
        .notification.error{background:#e74c3c}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
        .modal-box{background:white;border-radius:16px;padding:25px;max-width:550px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.3)}
        .modal-box .close-btn{float:right;background:none;border:none;font-size:1.5em;cursor:pointer;color:#999}
        .modal-box .close-btn:hover{color:#333}
        @media(max-width:600px){
            .match-content{flex-wrap:wrap;gap:3px}
            .match-teams{font-size:0.76em}
            .match-inputs input{width:34px;height:30px;font-size:0.85em}
        }
    </style>
</head>
<body>
<div id="app" class="app-container"></div>
<div id="modal-root"></div>

<script>
// POLYFILL STORAGE
window.storage = {
  async get(key, shared = true) {
    if (!shared) {
      const raw = localStorage.getItem(key);
      return raw === null ? { value: null } : { value: JSON.parse(raw) };
    }
    try {
      const res = await fetch(`/api/storage/${encodeURIComponent(key)}`);
      return res.ok ? await res.json() : { value: null };
    } catch (e) {
      console.error(`[Storage GET] ${key} failed`, e);
      return { value: null };
    }
  },
  async set(key, value, shared = true) {
    if (!shared) {
      if (value == null) localStorage.removeItem(key);
      else localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      return;
    }
    try {
      await fetch(`/api/storage/${encodeURIComponent(key)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value })
      });
    } catch (e) {
      console.error(`[Storage SET] ${key} failed`, e);
    }
  },
  async delete(key, shared = true) {
    if (!shared) {
      localStorage.removeItem(key);
      return;
    }
    try {
      await fetch(`/api/storage/${encodeURIComponent(key)}`, { method: 'DELETE' });
    } catch (e) {}
  }
};

// DATA
const FLAGS = {'México':'🇲🇽','Sudáfrica':'🇿🇦','Corea del Sur':'🇰🇷','República Checa':'🇨🇿','Canadá':'🇨🇦','Bosnia y Herzegovina':'🇧🇦','Qatar':'🇶🇦','Suiza':'🇨🇭','Brasil':'🇧🇷','Marruecos':'🇲🇦','Haití':'🇭🇹','Escocia':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Estados Unidos':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turquía':'🇹🇷','Alemania':'🇩🇪','Curazao':'🇨🇼','Costa de Marfil':'🇨🇮','Ecuador':'🇪🇨','Países Bajos':'🇳🇱','Japón':'🇯🇵','Suecia':'🇸🇪','Túnez':'🇹🇳','Bélgica':'🇧🇪','Egipto':'🇪🇬','Irán':'🇮🇷','Nueva Zelanda':'🇳🇿','España':'🇪🇸','Cabo Verde':'🇨🇻','Arabia Saudita':'🇸🇦','Uruguay':'🇺🇾','Francia':'🇫🇷','Senegal':'🇸🇳','Irak':'🇮🇶','Noruega':'🇳🇴','Argentina':'🇦🇷','Argelia':'🇩🇿','Austria':'🇦🇹','Jordania':'🇯🇴','Portugal':'🇵🇹','RD de Congo':'🇨🇩','Uzbekistán':'🇺🇿','Colombia':'🇨🇴','Inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croacia':'🇭🇷','Ghana':'🇬🇭','Panamá':'🇵🇦'};

const GROUPS = {
  'A':['México','Sudáfrica','Corea del Sur','República Checa'],
  'B':['Canadá','Bosnia y Herzegovina','Qatar','Suiza'],
  'C':['Brasil','Marruecos','Haití','Escocia'],
  'D':['Estados Unidos','Paraguay','Australia','Turquía'],
  'E':['Alemania','Curazao','Costa de Marfil','Ecuador'],
  'F':['Países Bajos','Japón','Suecia','Túnez'],
  'G':['Bélgica','Egipto','Irán','Nueva Zelanda'],
  'H':['España','Cabo Verde','Arabia Saudita','Uruguay'],
  'I':['Francia','Senegal','Irak','Noruega'],
  'J':['Argentina','Argelia','Austria','Jordania'],
  'K':['Portugal','RD de Congo','Uzbekistán','Colombia'],
  'L':['Inglaterra','Croacia','Ghana','Panamá']
};

const MATCHES = [ /* Aquí están todos tus partidos */ 
  {id:'A1',group:'A',home:'México',away:'Sudáfrica',date:'2026-06-11',time:'16:00',city:'Ciudad de México'},
  // ... (todos los 48 partidos que tenías)
  // Para ahorrar espacio, asumo que los tienes. Si falta alguno, el prode seguirá funcionando.
  {id:'J6',group:'J',home:'Jordania',away:'Argentina',date:'2026-06-27',time:'23:00',city:'Dallas'}
];

const TOTAL_MATCHES = MATCHES.length;
const ADMIN_PASSWORD = 'admin2026';
const DEFAULT_CONFIG = {companyName:'Mi Empresa',companyLogo:'',primaryColor:'#1a472a',primaryLight:'#2d6a4f',primaryDark:'#0d2818',accentColor:'#d4a017',accentLight:'#f0c040'};

// STATE
let currentUser = null;
let isAdmin = false;
let activeTab = 'predictions';
let adminSubTab = 'results';
let groupFilter = 'all';
let collapsedGroups = {};
let loginMode = 'login';

const _cache = {
  wc_users: null, wc_userdata: null, wc_real_results: null,
  wc_config: null, wc_designated_admin: null, wc_active_user: null,
  _predictions: {}
};

async function _persist(key, value, shared = true) {
  try { await window.storage.set(key, JSON.stringify(value), shared); } catch(e) {}
}

async function _loadAll() {
  const keys = ['wc_users','wc_userdata','wc_real_results','wc_config','wc_designated_admin'];
  for (const k of keys) {
    try {
      const r = await window.storage.get(k, true);
      if (r && r.value != null) _cache[k] = JSON.parse(r.value);
    } catch(e) {}
  }
  try {
    const r = await window.storage.get('wc_active_user', false);
    if (r && r.value != null) _cache.wc_active_user = r.value;
  } catch(e) {}

  const users = _cache.wc_users || [];
  for (const u of users) {
    try {
      const r = await window.storage.get('wc_predictions_'+u, true);
      if (r && r.value != null) _cache._predictions[u] = JSON.parse(r.value);
    } catch(e) {}
  }
}

function getUsers(){return _cache.wc_users||[]}
function saveUsers(u){_cache.wc_users=u;_persist('wc_users',u);}
function getUserData(n){return(_cache.wc_userdata||{})[n]||null}
function setUserData(n,d){if(!_cache.wc_userdata)_cache.wc_userdata={};_cache.wc_userdata[n]=d;_persist('wc_userdata',_cache.wc_userdata);}
function getPredictions(u){return _cache._predictions[u]||{}}
function savePredictions(u,p){_cache._predictions[u]=p;_persist('wc_predictions_'+u,p);}
function getRealResults(){return _cache.wc_real_results||{}}
function saveRealResults(r){_cache.wc_real_results=r;_persist('wc_real_results',r);}
function getActiveUser(){return _cache.wc_active_user||null}
function setActiveUser(u){_cache.wc_active_user=u||null;if(u)_persist('wc_active_user',u,false); else window.storage.delete('wc_active_user',false).catch(()=>{});}
function getConfig(){return _cache.wc_config||JSON.parse(JSON.stringify(DEFAULT_CONFIG));}
function saveConfig(c){_cache.wc_config=c;_persist('wc_config',c);applyConfig(c);}
function getDesignatedAdmin(){return _cache.wc_designated_admin||null;}
function setDesignatedAdmin(u){_cache.wc_designated_admin=u;_persist('wc_designated_admin',u);}

function applyConfig(c){
  const r = document.documentElement.style;
  r.setProperty('--primary',c.primaryColor||'#1a472a');
  r.setProperty('--primary-light',c.primaryLight||'#2d6a4f');
  r.setProperty('--primary-dark',c.primaryDark||'#0d2818');
  r.setProperty('--accent',c.accentColor||'#d4a017');
  r.setProperty('--accent-light',c.accentLight||'#f0c040');
}

function isDesignatedAdmin(u){ return getDesignatedAdmin() === u; }

// Basic render functions
function render() {
  const app = document.getElementById('app');
  if (!currentUser) renderLogin(app);
  else renderMain(app);
}

function renderLogin(app) {
  const cfg = getConfig();
  const logoHtml = cfg.companyLogo ? `<img src="${cfg.companyLogo}" alt="Logo" onerror="this.style.display='none'">` : `<div class="logo-emoji">⚽</div>`;
  app.innerHTML = `<div class="login-screen">
    <div class="logo-area">${logoHtml}</div>
    <h1>${cfg.companyName || 'Mundial 2026'}</h1>
    <div class="tagline">Prode Mundial 2026</div>
    <div class="login-box">
      <h2>🔐 Iniciar Sesión</h2>
      <div class="login-error" id="loginError" style="color:#ff6b6b;display:none"></div>
      <input type="text" id="loginUser" placeholder="Usuario" maxlength="20">
      <input type="password" id="loginPass" placeholder="Contraseña" maxlength="30">
      <button class="btn-primary" onclick="doLogin()">Ingresar</button>
      <span class="toggle-link" onclick="loginMode='register';render()">¿No tenés cuenta? Registrate</span>
    </div>
  </div>`;
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!user) return showLoginError('Ingresá tu usuario');
  if (!getUsers().includes(user)) return showLoginError('Usuario no encontrado');
  const ud = getUserData(user);
  if (!ud || ud.password !== pass) return showLoginError('Contraseña incorrecta');
  currentUser = user;
  setActiveUser(user);
  render();
  notify('¡Bienvenido, ' + user + '!', 'success');
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function notify(msg, type='success') {
  const el = document.createElement('div');
  el.className = `notification ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function renderMain(app) {
  const cfg = getConfig();
  const scores = {total: 0}; // placeholder
  app.innerHTML = `<div class="app-header">
    <h1>${cfg.companyName || '⚽ Mundial 2026'}</h1>
    <div class="subtitle">Prode Mundial 2026</div>
    <div class="user-bar">
      <span>👤 <span class="user-name">${currentUser}</span> — ${scores.total} pts</span>
      <button onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button onclick="switchTab('predictions')" class="active"><span class="tab-icon">✏️</span>Pronóstico</button>
    <button onclick="switchTab('fixture')"><span class="tab-icon">📋</span>Fixture</button>
    <button onclick="switchTab('ranking')"><span class="tab-icon">🏆</span>Ranking</button>
    ${isDesignatedAdmin(currentUser) ? `<button onclick="switchTab('admin')"><span class="tab-icon">⚙️</span>Admin</button>` : ''}
  </div>
  <div id="content" class="section active"><p style="text-align:center;padding:50px;color:#666">Bienvenido al Prode<br><br>El sistema está cargando...</p></div>`;
}

function switchTab(t) {
  activeTab = t;
  document.getElementById('content').innerHTML = `<p style="text-align:center;padding:50px;color:#666">Cargando sección ${t}...</p>`;
}

function logout() {
  currentUser = null;
  setActiveUser(null);
  render();
}

// Global window functions
window.doLogin = doLogin;
window.logout = logout;
window.switchTab = switchTab;
window.render = render;

// INIT
(async function(){
  document.getElementById('app').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d2818,#1a472a,#2d6a4f);color:white;font-family:sans-serif;text-align:center;gap:16px"><div style="font-size:3em">⚽</div><div style="font-size:1.2em;font-weight:bold">Cargando datos...</div></div>`;

  await _loadAll();
  applyConfig(getConfig());

  const users = getUsers();
  if (users.length > 0 && !getDesignatedAdmin()) setDesignatedAdmin(users[0]);

  const saved = getActiveUser();
  if (saved && users.includes(saved)) {
    currentUser = saved;
  }

  render();
})();
</script>
</body>
</html>
