<!DOCTYPE html>
<html lang="es" style="--primary: #1a472a; --primary-light: #2d6a4f; --primary-dark: #0d2818; --accent: #d4a017; --accent-light: #f0c040;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Fixture Mundial 2026 - Prode Empresarial</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#1a472a;--primary-light:#2d6a4f;--primary-dark:#0d2818;--accent:#d4a017;--accent-light:#f0c040;--white:#fff;--gray:#f0f0f0;--gray-dark:#333;--red:#c0392b;--blue:#2980b9;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,var(--primary-dark) 100%);min-height:100vh;color:var(--gray-dark)}
        .app-container{max-width:900px;margin:0 auto;min-height:100vh;background:rgba(255,255,255,0.97);box-shadow:0 0 40px rgba(0,0,0,0.3)}
        .app-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:var(--white);padding:15px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,0.3)}
        .app-header h1{font-size:1.3em;margin-bottom:2px;text-shadow:1px 1px 3px rgba(0,0,0,0.3)}
        .app-header .subtitle{font-size:0.75em;color:var(--accent-light);letter-spacing:2px;text-transform:uppercase}
        .header-logo{width:52px;height:52px;border-radius:50%;object-fit:cover;margin-bottom:5px;border:2px solid var(--accent);background:white;box-shadow:0 2px 8px rgba(0,0,0,0.25)}
        .user-bar{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:0.85em;padding:5px 10px;background:rgba(0,0,0,0.2);border-radius:20px}
        .user-bar .user-name{color:var(--accent-light);font-weight:bold}
        .user-bar button{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:3px 12px;border-radius:15px;cursor:pointer;font-size:0.8em;transition:all .3s}
        .user-bar button:hover{background:rgba(255,255,255,0.3)}
        .nav-tabs{display:flex;background:var(--primary-dark);overflow-x:auto}
        .nav-tabs button{flex:1;padding:12px 5px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-size:0.72em;cursor:pointer;transition:all .3s;border-bottom:3px solid transparent;white-space:nowrap}
        .nav-tabs button.active{color:var(--accent-light);border-bottom-color:var(--accent);background:rgba(255,255,255,0.05)}
        .nav-tabs button:hover{color:white;background:rgba(255,255,255,0.05)}
        .nav-tabs .tab-icon{display:block;font-size:1.3em;margin-bottom:2px}
        .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;text-align:center;background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:white}
        .login-screen .logo-area{margin-bottom:15px}
        .login-screen .logo-emoji{font-size:4em;animation:bounceIn .8s}
        .login-screen h1{font-size:1.8em;margin-bottom:5px;text-shadow:2px 2px 5px rgba(0,0,0,.3)}
        .login-screen .tagline{color:var(--accent-light);margin-bottom:25px;font-size:0.85em;letter-spacing:3px;text-transform:uppercase}
        .login-box{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:30px;width:100%;max-width:380px;border:1px solid rgba(255,255,255,.15)}
        .login-box h2{margin-bottom:20px;font-size:1.05em;color:rgba(255,255,255,.9)}
        .login-box input{width:100%;padding:13px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;font-size:0.95em;margin-bottom:12px;transition:all .3s;outline:none}
        .login-box input:focus{border-color:var(--accent);background:rgba(255,255,255,.15)}
        .login-box .btn-primary{width:100%;padding:13px;border:none;border-radius:12px;font-size:1em;font-weight:bold;cursor:pointer;transition:all .3s;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:var(--primary-dark)}
        .login-box .btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(212,160,23,.4)}
        .login-box .toggle-link{color:var(--accent-light);cursor:pointer;font-size:0.8em;margin-top:10px;display:inline-block;text-decoration:underline}
        .section{display:none;padding:15px;animation:fadeIn .4s}
        .section.active{display:block}
        .section-title{font-size:1.15em;font-weight:bold;color:var(--primary);margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:8px}
        .progress-container{margin-bottom:20px}
        .progress-label{display:flex;justify-content:space-between;font-size:0.8em;color:#666;margin-bottom:5px}
        .progress-bar{height:8px;background:#e0e0e0;border-radius:10px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:10px;transition:width .5s ease}
        .group-card{background:white;border-radius:12px;margin-bottom:15px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);border:1px solid #e8e8e8}
        .group-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;padding:10px 15px;font-weight:bold;font-size:0.95em;display:flex;justify-content:space-between;align-items:center}
        .group-header .group-badge{background:var(--accent);color:var(--primary-dark);padding:2px 10px;border-radius:10px;font-size:0.8em}
        .match-row{padding:10px 15px;border-bottom:1px solid #f0f0f0;transition:background .2s}
        .match-row:last-child{border-bottom:none}
        .match-row:hover{background:#f8f8f8}
        .match-row.locked-row{background:rgba(0,0,0,.02)}
        .match-date{font-size:0.65em;color:#999;margin-bottom:3px}
        .match-content{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
        .match-teams{flex:1;display:flex;align-items:center;gap:5px;font-size:0.83em;min-width:0}
        .team-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .match-inputs{display:flex;align-items:center;gap:4px;flex-shrink:0}
        .match-inputs input{width:38px;height:34px;text-align:center;border:2px solid #ddd;border-radius:8px;font-size:0.95em;font-weight:bold;outline:none;transition:all .3s}
        .match-inputs input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(212,160,23,.3)}
        .match-inputs input:disabled{background:#e9e9e9;color:#888;border-color:#ccc;cursor:not-allowed}
        .ranking-table{width:100%;border-collapse:collapse;font-size:0.85em}
        .ranking-table th{background:var(--primary);color:white;padding:10px 8px;text-align:left;font-size:0.8em;position:sticky;top:0}
        .ranking-table td{padding:10px 8px;border-bottom:1px solid #eee}
        .ranking-table tr:hover td{background:#f5f5f5}
        .current-user-row{background:rgba(41,128,185,.1)!important;font-weight:bold}
        .current-user-row td{border-left:3px solid var(--blue)}
        .notification{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;color:white;font-weight:bold;z-index:1000;animation:bounceIn .5s;box-shadow:0 4px 15px rgba(0,0,0,.2);max-width:350px}
        .notification.success{background:#27ae60}
        .notification.error{background:#e74c3c}
        .admin-subtabs{display:flex;gap:6px;margin-bottom:15px;flex-wrap:wrap}
        .admin-subtabs button{padding:8px 16px;border:2px solid var(--primary);background:white;color:var(--primary);border-radius:20px;font-size:0.78em;cursor:pointer;transition:all .3s;font-weight:bold}
        .admin-subtabs button.active{background:var(--primary);color:white}
        .user-mgmt-table{width:100%;border-collapse:collapse;font-size:0.82em;margin-top:10px}
        .user-mgmt-table th{background:var(--primary);color:white;padding:10px 6px;text-align:left}
        .user-mgmt-table td{padding:8px 6px;border-bottom:1px solid #eee}
        .btn-small{padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-size:0.78em;font-weight:bold;margin:2px}
        .btn-delete{background:#e74c3c;color:white}
        .btn-view{background:var(--blue);color:white}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
        .modal-box{background:white;border-radius:16px;padding:25px;max-width:550px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.3)}
        .modal-box h3{color:var(--primary);margin-bottom:15px}
        .modal-box .close-btn{float:right;background:none;border:none;font-size:1.5em;cursor:pointer;color:#999}
        .modal-box .close-btn:hover{color:#333}
        .admin-panel .save-btn{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:var(--primary-dark);border:none;padding:10px 20px;border-radius:10px;font-weight:bold;cursor:pointer;margin:4px}
        @media(max-width:600px){
            .match-content{flex-wrap:wrap;gap:3px}
            .match-teams{font-size:0.76em}
            .match-inputs input{width:34px;height:30px;font-size:0.85em}
            .nav-tabs button{font-size:0.62em}
        }
    </style>
</head>
<body>
<div id="app" class="app-container"></div>
<div id="modal-root"></div>

<script>
// ===============================================
// PERSISTENCIA (POLI-STORAGE)
// ===============================================
window.storage = {
    async get(key, shared = true) {
        if (!shared) {
            const raw = localStorage.getItem(key);
            return raw === null ? { value: null } : { value: JSON.parse(raw) };
        }
        try {
            const res = await fetch(`/api/storage/${encodeURIComponent(key)}`);
            return res.ok ? await res.json() : { value: null };
        } catch (e) { return { value: null }; }
    },
    async set(key, value, shared = true) {
        if (!shared) {
            if (value == null) localStorage.removeItem(key);
            else localStorage.setItem(key, JSON.stringify(value));
            return;
        }
        try {
            await fetch(`/api/storage/${encodeURIComponent(key)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value })
            });
        } catch (e) { console.error("Error saving", e); }
    }
};

// ===============================================
// ESTADO GLOBAL
// ===============================================
let matches = [];
let users = {};
let config = {
    title: "Fixture Mundial 2026",
    subtitle: "PRODE EMPRESARIAL",
    logoUrl: "",
    lockDate: "2026-06-11T12:00",
    adminPass: "admin123"
};
let currentUser = null;
let activeTab = 'pronosticos';
let adminSubTab = 'resultados';
let loginMode = 'login';

// ===============================================
// MOTOR DE DATOS
// ===============================================
async function _loadAll() {
    const rMatches = await storage.get('db_matches');
    matches = rMatches.value || [
        {id:1, group:'A', date:'2026-06-11T16:00', t1:'México', f1:'🇲🇽', t2:'A2', f2:'🏳️', s1:null, s2:null},
        {id:2, group:'A', date:'2026-06-11T19:00', t1:'Estados Unidos', f1:'🇺🇸', t2:'A4', f2:'🏳️', s1:null, s2:null}
    ];
    const rUsers = await storage.get('db_users');
    users = rUsers.value || {};
    const rConfig = await storage.get('db_config');
    if(rConfig.value) config = {...config, ...rConfig.value};
}

async function _saveMatches() { await storage.set('db_matches', matches); }
async function _saveUsers() { await storage.set('db_users', users); }
async function _saveConfig() { await storage.set('db_config', config); }

function applyConfig(cfg) {
    document.title = cfg.title;
    const root = document.documentElement;
    if(cfg.primaryColor) root.style.setProperty('--primary', cfg.primaryColor);
    if(cfg.accentColor) root.style.setProperty('--accent', cfg.accentColor);
}

// ===============================================
// LÓGICA DE NEGOCIO
// ===============================================
function isLocked(matchDateStr) {
    const now = new Date();
    const matchDate = new Date(matchDateStr);
    const globalLock = new Date(config.lockDate);
    // Bloquea si pasó la fecha global O si faltan menos de 15 min para el partido
    return now > globalLock || (matchDate - now) < (15 * 60 * 1000);
}

function calculatePoints(pred1, pred2, real1, real2) {
    if (real1 === null || real2 === null) return 0;
    if (pred1 === real1 && pred2 === real2) return 3; // Exacto
    const predDiff = pred1 - pred2;
    const realDiff = real1 - real2;
    if ((predDiff > 0 && realDiff > 0) || (predDiff < 0 && realDiff < 0) || (predDiff === 0 && realDiff === 0)) return 1; // Ganador/Empate
    return 0;
}

function getRanking() {
    return Object.values(users).map(u => {
        let pts = 0;
        let exacts = 0;
        matches.forEach(m => {
            if (m.s1 !== null && u.preds && u.preds[m.id]) {
                const p = u.preds[m.id];
                const gained = calculatePoints(p.s1, p.s2, m.s1, m.s2);
                pts += gained;
                if (gained === 3) exacts++;
            }
        });
        return { name: u.name, points: pts, exacts, id: u.id };
    }).sort((a, b) => b.points - a.points || b.exacts - a.exacts || a.name.localeCompare(b.name));
}

// ===============================================
// ACCIONES DE USUARIO
// ===============================================
async function doLogin() {
    const userVal = document.getElementById('li-user').value.trim().toLowerCase();
    const passVal = document.getElementById('li-pass').value;
    if (users[userVal] && users[userVal].pass === passVal) {
        currentUser = users[userVal];
        await storage.set('session_user', userVal, false);
        render();
    } else {
        showNotify("Credenciales incorrectas", "error");
    }
}

async function doRegister() {
    const userVal = document.getElementById('li-user').value.trim().toLowerCase();
    const passVal = document.getElementById('li-pass').value;
    const nameVal = document.getElementById('li-name').value.trim();
    if (!userVal || !passVal || !nameVal) return showNotify("Completa todos los campos", "error");
    if (users[userVal]) return showNotify("El usuario ya existe", "error");
    
    users[userVal] = { id: userVal, pass: passVal, name: nameVal, preds: {} };
    await _saveUsers();
    currentUser = users[userVal];
    await storage.set('session_user', userVal, false);
    showNotify("Cuenta creada con éxito");
    render();
}

function logout() {
    currentUser = null;
    storage.set('session_user', null, false);
    render();
}

async function savePred(mid, teamIdx, val) {
    if (!currentUser) return;
    const match = matches.find(m => m.id === mid);
    if (isLocked(match.date)) return showNotify("Partido bloqueado", "error");
    
    if (!currentUser.preds[mid]) currentUser.preds[mid] = { s1: 0, s2: 0 };
    currentUser.preds[mid]['s' + teamIdx] = val === "" ? 0 : parseInt(val);
    users[currentUser.id].preds = currentUser.preds;
    await _saveUsers();
}

// ===============================================
// RENDERIZADO
// ===============================================
function showNotify(msg, type='success') {
    const n = document.createElement('div');
    n.className = `notification ${type}`;
    n.innerText = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3000);
}

function switchTab(t) { activeTab = t; render(); }
function switchAdminTab(t) { adminSubTab = t; render(); }

function render() {
    const app = document.getElementById('app');
    if (!currentUser) return renderLogin(app);

    let h = `
        <header class="app-header">
            ${config.logoUrl ? `<img src="${config.logoUrl}" class="header-logo">` : `<div style="font-size:2em">⚽</div>`}
            <h1>${config.title}</h1>
            <div class="subtitle">${config.subtitle}</div>
            <div class="user-bar">
                <span>Hola, <span class="user-name">${currentUser.name}</span></span>
                <button onclick="logout()">Salir</button>
            </div>
        </header>
        <nav class="nav-tabs">
            <button class="${activeTab==='pronosticos'?'active':''}" onclick="switchTab('pronosticos')">
                <span class="tab-icon">🏟️</span>PRONÓSTICOS
            </button>
            <button class="${activeTab==='posiciones'?'active':''}" onclick="switchTab('posiciones')">
                <span class="tab-icon">🏆</span>POSICIONES
            </button>
            <button class="${activeTab==='admin'?'active':''}" onclick="switchTab('admin')">
                <span class="tab-icon">⚙️</span>ADMIN
            </button>
        </nav>
    `;

    if (activeTab === 'pronosticos') h += renderPronosticos();
    else if (activeTab === 'posiciones') h += renderRanking();
    else h += renderAdmin();

    app.innerHTML = h;
}

function renderLogin(el) {
    el.innerHTML = `
        <div class="login-screen">
            <div class="logo-area">
                <div class="logo-emoji">⚽</div>
            </div>
            <h1>${config.title}</h1>
            <div class="tagline">${config.subtitle}</div>
            <div class="login-box">
                <h2>${loginMode==='login'?'Ingresar':'Crear Cuenta'}</h2>
                <input type="text" id="li-user" placeholder="Usuario (ID)">
                ${loginMode==='reg' ? `<input type="text" id="li-name" placeholder="Nombre completo">` : ''}
                <input type="password" id="li-pass" placeholder="Contraseña">
                <button class="btn-primary" onclick="${loginMode==='login'?'doLogin()':'doRegister()'}">
                    ${loginMode==='login'?'ENTRAR':'REGISTRARME'}
                </button>
                <span class="toggle-link" onclick="loginMode='${loginMode==='login'?'reg':'login'}';render()">
                    ${loginMode==='login'?'¿No tienes cuenta? Regístrate':'¿Ya tienes cuenta? Ingresa'}
                </span>
            </div>
        </div>
    `;
}

function renderPronosticos() {
    const groups = [...new Set(matches.map(m => m.group))];
    let h = `<div class="section active">
        <div class="section-title"><span>🏟️</span> Mis Pronósticos</div>
        <div class="lock-info-box">⚽ <b>Cierre global:</b> ${new Date(config.lockDate).toLocaleString()}</div>
    `;

    groups.forEach(g => {
        h += `
            <div class="group-card">
                <div class="group-header">Grupo ${g} <span class="group-badge">Mundial 2026</span></div>
                <div class="group-body">
        `;
        matches.filter(m => m.group === g).forEach(m => {
            const locked = isLocked(m.date);
            const p = currentUser.preds[m.id] || {s1:'', s2:''};
            h += `
                <div class="match-row ${locked?'locked-row':''}">
                    <div class="match-date">${new Date(m.date).toLocaleString()} ${locked?'🔒':''}</div>
                    <div class="match-content">
                        <div class="match-teams">
                            <span>${m.f1}</span> <span class="team-name">${m.t1}</span>
                            <span class="vs-label">VS</span>
                            <span class="team-name">${m.t2}</span> <span>${m.f2}</span>
                        </div>
                        <div class="match-inputs">
                            <input type="number" value="${p.s1}" ${locked?'disabled':''} onchange="savePred(${m.id},1,this.value)">
                            <span class="score-sep">-</span>
                            <input type="number" value="${p.s2}" ${locked?'disabled':''} onchange="savePred(${m.id},2,this.value)">
                        </div>
                        ${m.s1!==null ? `
                            <div class="real-result">R: ${m.s1}-${m.s2}</div>
                            ${renderBadge(p.s1, p.s2, m.s1, m.s2)}
                        ` : ''}
                    </div>
                </div>
            `;
        });
        h += `</div></div>`;
    });
    return h + `</div>`;
}

function renderBadge(p1, p2, r1, r2) {
    const pts = calculatePoints(p1, p2, r1, r2);
    if(pts === 3) return `<span class="match-result-badge badge-exact">¡EXACTO! +3</span>`;
    if(pts === 1) return `<span class="match-result-badge badge-winner">ACIERTO +1</span>`;
    return `<span class="match-result-badge badge-miss">0 PTS</span>`;
}

function renderRanking() {
    const ranking = getRanking();
    let h = `<div class="section active">
        <div class="section-title"><span>🏆</span> Tabla de Posiciones</div>
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Participante</th>
                    <th>Pts</th>
                    <th>Ex</th>
                </tr>
            </thead>
            <tbody>
    `;
    ranking.forEach((u, i) => {
        h += `
            <tr class="${u.id === currentUser.id ? 'current-user-row' : ''}">
                <td>${i+1}</td>
                <td>${u.name}</td>
                <td><b>${u.points}</b></td>
                <td>${u.exacts}</td>
            </tr>
        `;
    });
    return h + `</tbody></table></div>`;
}

// ===============================================
// PANEL ADMIN COMPLETO (Integrado de Ultimo.htm)
// ===============================================
function renderAdmin() {
    let h = `<div class="section active admin-panel">
        <div class="section-title"><span>⚙️</span> Administración</div>
        <div class="admin-subtabs">
            <button class="${adminSubTab==='resultados'?'active':''}" onclick="switchAdminTab('resultados')">Resultados</button>
            <button class="${adminSubTab==='usuarios'?'active':''}" onclick="switchAdminTab('usuarios')">Usuarios</button>
            <button class="${adminSubTab==='config'?'active':''}" onclick="switchAdminTab('config')">Configuración</button>
            <button class="${adminSubTab==='datos'?'active':''}" onclick="switchAdminTab('datos')">Exportar/Importar</button>
        </div>
    `;

    if(adminSubTab === 'resultados') h += renderAdminResults();
    else if(adminSubTab === 'usuarios') h += renderAdminUsers();
    else if(adminSubTab === 'config') h += renderAdminConfig();
    else h += renderAdminData();

    return h + `</div>`;
}

function renderAdminResults() {
    let h = `<p style="font-size:0.8em; margin-bottom:10px;">Ingresa los resultados reales para actualizar el ranking.</p>`;
    matches.forEach(m => {
        h += `
            <div class="match-row" style="display:flex; align-items:center; gap:10px;">
                <div style="flex:1; font-size:0.8em">${m.t1} vs ${m.t2}</div>
                <div class="match-inputs">
                    <input type="number" id="am1-${m.id}" value="${m.s1??''}" style="width:40px" onchange="updateMatchReal(${m.id})">
                    <input type="number" id="am2-${m.id}" value="${m.s2??''}" style="width:40px" onchange="updateMatchReal(${m.id})">
                </div>
            </div>
        `;
    });
    return h;
}

async function updateMatchReal(mid) {
    const s1 = document.getElementById(`am1-${mid}`).value;
    const s2 = document.getElementById(`am2-${mid}`).value;
    const m = matches.find(x => x.id === mid);
    m.s1 = s1 === "" ? null : parseInt(s1);
    m.s2 = s2 === "" ? null : parseInt(s2);
    await _saveMatches();
}

function renderAdminUsers() {
    let h = `
        <table class="user-mgmt-table">
            <thead><tr><th>Nombre</th><th>Acciones</th></tr></thead>
            <tbody>
    `;
    Object.values(users).forEach(u => {
        h += `
            <tr>
                <td>${u.name} (${u.id})</td>
                <td>
                    <button class="btn-small btn-view" onclick="viewUserPreds('${u.id}')">Ver</button>
                    <button class="btn-small btn-delete" onclick="deleteUser('${u.id}')">Eliminar</button>
                </td>
            </tr>
        `;
    });
    return h + `</tbody></table>`;
}

async function deleteUser(uid) {
    if(!confirm(`¿Eliminar a ${uid}?`)) return;
    delete users[uid];
    await _saveUsers();
    render();
}

function renderAdminConfig() {
    return `
        <div class="modal-box" style="box-shadow:none; padding:0; width:100%">
            <label>Título del Prode</label>
            <input type="text" id="cfg-title" value="${config.title}">
            <label>Subtítulo</label>
            <input type="text" id="cfg-subtitle" value="${config.subtitle}">
            <label>URL Logo (Imagen)</label>
            <input type="text" id="cfg-logo" value="${config.logoUrl}">
            <label>Fecha de Cierre (Bloqueo de pronósticos)</label>
            <input type="datetime-local" id="cfg-lock" value="${config.lockDate}">
            <label>Colores Base</label>
            <div style="display:flex; gap:10px">
                <input type="color" id="cfg-c1" value="${getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#1a472a'}">
                <input type="color" id="cfg-c2" value="${getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#d4a017'}">
            </div>
            <button class="save-btn" style="width:100%; margin-top:20px" onclick="saveGlobalConfig()">Guardar Configuración</button>
        </div>
    `;
}

async function saveGlobalConfig() {
    config.title = document.getElementById('cfg-title').value;
    config.subtitle = document.getElementById('cfg-subtitle').value;
    config.logoUrl = document.getElementById('cfg-logo').value;
    config.lockDate = document.getElementById('cfg-lock').value;
    config.primaryColor = document.getElementById('cfg-c1').value;
    config.accentColor = document.getElementById('cfg-c2').value;
    
    await _saveConfig();
    applyConfig(config);
    showNotify("Configuración actualizada");
    render();
}

function renderAdminData() {
    return `
        <div style="padding:10px">
            <h4>Exportar Datos</h4>
            <p style="font-size:0.7em">Descarga un respaldo en JSON de todos los usuarios y partidos.</p>
            <button class="save-btn" onclick="exportData()">Descargar JSON</button>
            <hr style="margin:20px 0; opacity:0.2">
            <h4>Importar Datos</h4>
            <input type="file" id="import-file" accept=".json" style="font-size:0.8em">
            <button class="save-btn" onclick="importData()">Subir e Importar</button>
        </div>
    `;
}

function exportData() {
    const data = { matches, users, config };
    const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `prode_backup_${new Date().getTime()}.json`;
    a.click();
}

async function importData() {
    const file = document.getElementById('import-file').files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if(data.matches) matches = data.matches;
            if(data.users) users = data.users;
            if(data.config) config = data.config;
            await _saveMatches();
            await _saveUsers();
            await _saveConfig();
            location.reload();
        } catch(err) { alert("Error al importar archivo"); }
    };
    reader.readAsText(file);
}

// ===============================================
// MODAL PARA VER PRONÓSTICOS DE OTROS
// ===============================================
function viewUserPreds(uid) {
    const u = users[uid];
    const root = document.getElementById('modal-root');
    let h = `
        <div class="modal-overlay" onclick="closeModal()">
            <div class="modal-box" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeModal()">×</button>
                <h3>Pronósticos de ${u.name}</h3>
                <table style="width:100%; font-size:0.8em">
                    ${matches.map(m => {
                        const p = u.preds[m.id] || {s1:'-', s2:'-'};
                        return `<tr><td>${m.t1} vs ${m.t2}</td><td><b>${p.s1} - ${p.s2}</b></td></tr>`;
                    }).join('')}
                </table>
            </div>
        </div>
    `;
    root.innerHTML = h;
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ===============================================
// INICIO DE LA APP
// ===============================================
(async function init() {
    document.getElementById('app').innerHTML = `<div style="color:white; text-align:center; padding-top:100px">Cargando base de datos...</div>`;
    await _loadAll();
    applyConfig(config);
    
    // Auto-login si hay sesión
    const sess = await storage.get('session_user', false);
    if(sess.value && users[sess.value]) currentUser = users[sess.value];
    
    render();
})();
</script>
</body>
</html>
