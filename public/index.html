window.storage = {
  async get(key, shared = true) {
    if (!shared) {
      const raw = localStorage.getItem(key);
      return raw === null ? { value: null } : { value: JSON.parse(raw) };
    }
    try {
      const res = await fetch(`/api/storage/${encodeURIComponent(key)}`);
      return res.ok ? await res.json() : { value: null };
    } catch (e) {
      console.error(`[Storage GET] ${key} failed`, e);
      return { value: null };
    }
  },
  async set(key, value, shared = true) {
    if (!shared) {
      if (value == null) localStorage.removeItem(key);
      else localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      return;
    }
    try {
      await fetch(`/api/storage/${encodeURIComponent(key)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value })
      });
    } catch (e) {
      console.error(`[Storage SET] ${key} failed`, e);
    }
  },
  async delete(key, shared = true) {
    if (!shared) {
      localStorage.removeItem(key);
      return;
    }
    try {
      await fetch(`/api/storage/${encodeURIComponent(key)}`, { method: 'DELETE' });
    } catch (e) {}
  }
};

}

async function _loadAll() {
  const keys = ['wc_users','wc_userdata','wc_real_results','wc_config','wc_designated_admin'];
  for (const k of keys) {
    try {
      const r = await window.storage.get(k, true);
      if (r && r.value != null) {
        _cache[k] = JSON.parse(r.value);
      }
    } catch(e) {}
  }
  try {
    const r = await window.storage.get('wc_active_user', false);
    if (r && r.value != null) _cache.wc_active_user = r.value;
  } catch(e) {}

  const users = _cache.wc_users || [];
  for (const u of users) {
    try {
      const r = await window.storage.get('wc_predictions_'+u, true);
      if (r && r.value != null) _cache._predictions[u] = JSON.parse(r.value);
    } catch(e) {}
  }
}

// ====================== HELPERS ======================
function getUsers(){return _cache.wc_users||[]}
function saveUsers(u){_cache.wc_users=u;_persist('wc_users',u)}

function getUserData(n){return(_cache.wc_userdata||{})[n]||null}
function setUserData(n,d){if(!_cache.wc_userdata)_cache.wc_userdata={};_cache.wc_userdata[n]=d;_persist('wc_userdata',_cache.wc_userdata)}
function deleteUserData(n){if(_cache.wc_userdata)delete _cache.wc_userdata[n];_persist('wc_userdata',_cache.wc_userdata||{})}

function getPredictions(u){return _cache._predictions[u]||{}}
function savePredictions(u,p){_cache._predictions[u]=p;_persist('wc_predictions_'+u,p)}
function deletePredictions(u){delete _cache._predictions[u];(async()=>{try{await window.storage.delete('wc_predictions_'+u,true)}catch(e){}})()}

function getRealResults(){return _cache.wc_real_results||{}}
function saveRealResults(r){_cache.wc_real_results=r;_persist('wc_real_results',r)}

function getActiveUser(){return _cache.wc_active_user||null}
function setActiveUser(u){_cache.wc_active_user=u||null;if(u)_persist('wc_active_user',u,false);else(async()=>{try{await window.storage.delete('wc_active_user',false)}catch(e){}})()}

function getConfig(){return _cache.wc_config||JSON.parse(JSON.stringify(DEFAULT_CONFIG))}
function saveConfig(c){_cache.wc_config=c;_persist('wc_config',c);applyConfig(c)}

function getDesignatedAdmin(){return _cache.wc_designated_admin||null}
function setDesignatedAdmin(u){_cache.wc_designated_admin=u;_persist('wc_designated_admin',u)}
function isDesignatedAdmin(u){return getDesignatedAdmin()===u;}

function applyConfig(c){
  const r=document.documentElement.style;
  r.setProperty('--primary',c.primaryColor||DEFAULT_CONFIG.primaryColor);
  r.setProperty('--primary-light',c.primaryLight||DEFAULT_CONFIG.primaryLight);
  r.setProperty('--primary-dark',c.primaryDark||DEFAULT_CONFIG.primaryDark);
  r.setProperty('--accent',c.accentColor||DEFAULT_CONFIG.accentColor);
  r.setProperty('--accent-light',c.accentLight||DEFAULT_CONFIG.accentLight);
}

// ====================== LOCK LOGIC ======================
function getMatchLockTime(m) {
  const parts = m.date.split('-');
  const year  = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10) - 1;
  const day   = parseInt(parts[2], 10);
  return new Date(year, month, day, 1, 0, 0);
}

function isTimeLocked(m) {
  return new Date() >= getMatchLockTime(m);
}

function hasRealResult(matchId) {
  const r = getRealResults()[matchId];
  return r && r.home !== '' && r.away !== '' && !isNaN(parseInt(r.home)) && !isNaN(parseInt(r.away));
}

function isMatchLocked(m) {
  return hasRealResult(m.id) || isTimeLocked(m);
}

function getLockReason(m) {
  if (hasRealResult(m.id)) return 'result';
  if (isTimeLocked(m))     return 'time';
  return null;
}

function formatLockTime(m) {
  const d = getMatchLockTime(m);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d.getDate()} ${months[d.getMonth()]} 01:00 AM`;
}

// ====================== SCORE & RANKING ======================
function calcScore(pred,real){
  if(!pred||!real||pred.home===''||pred.away===''||real.home===''||real.away==='')return{pts:0,type:'pending'};
  const ph=parseInt(pred.home),pa=parseInt(pred.away),rh=parseInt(real.home),ra=parseInt(real.away);
  if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra))return{pts:0,type:'pending'};
  if(ph===rh&&pa===ra)return{pts:3,type:'exact'};
  if(Math.sign(ph-pa)===Math.sign(rh-ra))return{pts:1,type:'winner'};
  return{pts:0,type:'miss'};
}

function calcUserScores(u){
  const preds=getPredictions(u),reals=getRealResults();
  let total=0,exact=0,winner=0,miss=0,pending=0,predicted=0;
  MATCHES.forEach(m=>{
    const p=preds[m.id],r=reals[m.id];
    if(p&&p.home!==''&&p.away!=='')predicted++;
    const s=calcScore(p,r);
    total+=s.pts;
    if(s.type==='exact')exact++;
    else if(s.type==='winner')winner++;
    else if(s.type==='miss')miss++;
    else pending++;
  });
  return{total,exact,winner,miss,pending,predicted};
}

function getAllRanking(){
  return getUsers().map(u=>({name:u,...calcUserScores(u)})).sort((a,b)=>b.total-a.total||b.exact-a.exact||b.winner-a.winner||a.name.localeCompare(b.name));
}

function formatDate(d){
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const parts=d.split('-');
  const dt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  return days[dt.getDay()]+' '+dt.getDate()+' '+months[dt.getMonth()];
}

function notify(msg,type='success'){
  const el=document.createElement('div');el.className='notification '+type;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),500)},2500);
}

function closeModal(){document.getElementById('modal-root').innerHTML='';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ============================================================
// RENDER
// ============================================================
function render(){const app=document.getElementById('app');if(!currentUser)renderLogin(app);else renderMain(app)}

// LOGIN
function renderLogin(app){
  const cfg=getConfig();
  const logoHtml=cfg.companyLogo?`<img src="${esc(cfg.companyLogo)}" alt="Logo" onerror="this.style.display='none'">`:`<div class="logo-emoji">⚽</div>`;
  app.innerHTML=`<div class="login-screen">
<div class="logo-area">${logoHtml}</div>
<h1>${esc(cfg.companyName)||'Mundial 2026'}</h1>
<div class="tagline">Prode Mundial 2026</div>
<div class="login-box" id="loginBox">
${loginMode==='login'?`
<h2>🔐 Iniciar Sesión</h2>
<div class="login-error" id="loginError"></div>
<input type="text" id="loginUser" placeholder="Usuario" maxlength="20">
<input type="password" id="loginPass" placeholder="Contraseña" maxlength="30">
<button class="btn-primary" onclick="doLogin()">Ingresar</button>
<span class="toggle-link" onclick="loginMode='register';render()">¿No tenés cuenta? Registrate</span>
`:` 
<h2>📝 Crear Cuenta</h2>
<div class="login-error" id="loginError"></div>
<input type="text" id="regUser" placeholder="Usuario" maxlength="20">
<input type="password" id="regPass" placeholder="Contraseña" maxlength="30">
<input type="password" id="regPass2" placeholder="Repetir contraseña" maxlength="30">
<button class="btn-primary" onclick="doRegister()">Crear Cuenta</button>
<span class="toggle-link" onclick="loginMode='login';render()">Ya tengo cuenta</span>
`}
</div></div>`;
}

function showLoginError(msg){const el=document.getElementById('loginError');if(el){el.textContent=msg;el.style.display='block';}}

function doLogin(){
  const user=(document.getElementById('loginUser').value||'').trim();
  const pass=document.getElementById('loginPass').value||'';
  if(!user){showLoginError('Ingresá tu usuario');return}
  if(!getUsers().includes(user)){showLoginError('Usuario no encontrado');return}
  const ud=getUserData(user);
  if(!ud||ud.password!==pass){showLoginError('Contraseña incorrecta');return}
  currentUser=user;setActiveUser(user);isAdmin=false;activeTab='predictions';render();notify('¡Bienvenido, '+user+'! 🎉');
}

function doRegister(){
  const user=(document.getElementById('regUser').value||'').trim();
  const pass=document.getElementById('regPass').value||'';
  const pass2=document.getElementById('regPass2').value||'';
  if(!user||user.length<2){showLoginError('Usuario mínimo 2 caracteres');return}
  if(!pass||pass.length<3){showLoginError('Contraseña mínimo 3 caracteres');return}
  if(pass!==pass2){showLoginError('Contraseñas no coinciden');return}
  const users=getUsers();
  if(users.includes(user)){showLoginError('Usuario ya existe');return}
  const isFirst=users.length===0;
  users.push(user);saveUsers(users);
  setUserData(user,{password:pass,createdAt:new Date().toISOString()});
  if(isFirst)setDesignatedAdmin(user);
  currentUser=user;setActiveUser(user);activeTab='predictions';render();notify('¡Cuenta creada! Bienvenido '+user+' 🎉');
}

// MAIN
function renderMain(app){
  const cfg=getConfig();const scores=calcUserScores(currentUser);
  const logoHtml=cfg.companyLogo?`<img class="header-logo" src="${esc(cfg.companyLogo)}" alt="" onerror="this.style.display='none'">`:'';
  app.innerHTML=`<div class="app-header">
${logoHtml}
<h1>${esc(cfg.companyName)||'⚽ Mundial 2026'}</h1>
<div class="subtitle">Prode Mundial 2026</div>
<div class="user-bar">
<span>👤 <span class="user-name">${esc(currentUser)}</span> — ${scores.total} pts</span>
<button onclick="logout()">Salir</button>
</div></div>
<div class="nav-tabs">
<button onclick="switchTab('fixture')"><span class="tab-icon">📋</span>Fixture</button>
<button onclick="switchTab('predictions')"><span class="tab-icon">✏️</span>Pronóstico</button>
<button onclick="switchTab('ranking')"><span class="tab-icon">🏆</span>Ranking</button>
${isDesignatedAdmin(currentUser)?`<button onclick="switchTab('admin')"><span class="tab-icon">⚙️</span>Admin</button>`:''}
</div><div id="content"></div>`;
  updateNav();renderContent();
}

function switchTab(t){
  if(t==='admin'&&!isDesignatedAdmin(currentUser))return;
  activeTab=t;updateNav();renderContent();
}

function updateNav(){
  const tabs=['fixture','predictions','ranking','admin'];
  document.querySelectorAll('.nav-tabs button').forEach((b,i)=>{
    b.classList.toggle('active',tabs[i]===activeTab);
  });
}

function renderContent(){const el=document.getElementById('content');if(!el)return;switch(activeTab){case 'fixture':renderFixture(el);break;case 'predictions':renderPredictions(el);break;case 'ranking':renderRanking(el);break;case 'admin':renderAdmin(el);break}}

// FIXTURE
function renderFixture(el){
  const reals=getRealResults();
  let h=`<div class="section active"><div class="section-title">📋 Fixture Completo</div>`;
  (groupFilter==='all'?Object.keys(GROUPS):[groupFilter]).forEach(g=>{
    const gm=MATCHES.filter(m=>m.group===g);
    h+=`<div class="group-card"><div class="group-header">Grupo ${g} — ${GROUPS[g].map(t=>fl(t)).join(' ')}</div>`;
    gm.forEach(m=>{
      const r=reals[m.id];
      h+=`<div class="match-row"><div class="match-date">${formatDate(m.date)} ${m.time} — ${m.city}</div>
      <div class="match-content"><div class="match-teams">
      <span class="team-flag">${fl(m.home)}</span><span class="team-name">${m.home}</span>
      <span class="vs-label">vs</span>
      <span class="team-flag">${fl(m.away)}</span><span class="team-name">${m.away}</span>
      </div>${r&&r.home!==''?`<span class="real-result">${r.home} - ${r.away}</span>`:'<span style="color:#aaa">Pendiente</span>'}</div></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}

// PRONÓSTICO (con bloqueo por hora)
function renderPredictions(el){
  const preds=getPredictions(currentUser),reals=getRealResults();
  let h=`<div class="section active"><div class="section-title">✏️ Mi Pronóstico</div>`;
  h+=`<div class="filter-bar"><label>Grupo:</label><select onchange="groupFilter=this.value;renderContent()">`;
  h+=`<option value="all">Todos</option>`;
  Object.keys(GROUPS).forEach(g=>h+=`<option value="${g}" ${groupFilter===g?'selected':''}>Grupo ${g}</option>`);
  h+=`</select></div>`;

  (groupFilter==='all'?Object.keys(GROUPS):[groupFilter]).forEach(g=>{
    const gm=MATCHES.filter(m=>m.group===g);
    h+=`<div class="group-card"><div class="group-header">Grupo ${g}</div>`;
    gm.forEach(m=>{
      const p=preds[m.id]||{home:'',away:''};
      const locked=isMatchLocked(m);
      const lockReason=getLockReason(m);
      h+=`<div class="match-row ${locked?'locked-row':''}">
        <div class="match-date">${formatDate(m.date)} ${m.time} — ${m.city} ${lockReason==='time'?'⏰':lockReason==='result'?'🔒':''}</div>
        <div class="match-content">
          <div class="match-teams"><span class="team-flag">${fl(m.home)}</span><span class="team-name">${m.home}</span></div>
          <div class="match-inputs">
            <input type="number" min="0" max="20" value="${p.home}" data-match="${m.id}" data-side="home" ${locked?'disabled':''} onchange="savePred(this)">
            <span class="score-sep">-</span>
            <input type="number" min="0" max="20" value="${p.away}" data-match="${m.id}" data-side="away" ${locked?'disabled':''} onchange="savePred(this)">
          </div>
          <div class="match-teams"><span class="team-flag">${fl(m.away)}</span><span class="team-name">${m.away}</span></div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}

function savePred(input){
  if(input.disabled)return;
  const mid=input.dataset.match;
  const m=MATCHES.find(x=>x.id===mid);
  if(m&&isMatchLocked(m)){
    notify('Este partido ya está bloqueado','error');
    return;
  }
  let val=input.value.trim();
  if(val!==''){let n=parseInt(val);if(isNaN(n)||n<0)n=0;if(n>20)n=20;val=n.toString();input.value=n;}
  const preds=getPredictions(currentUser);
  if(!preds[mid])preds[mid]={home:'',away:''};
  preds[mid][input.dataset.side]=val;
  savePredictions(currentUser,preds);
}

// RANKING
function renderRanking(el){
  const ranking=getAllRanking();
  let h=`<div class="section active"><div class="section-title">🏆 Ranking General</div>`;
  h+=`<table class="ranking-table"><tr><th>#</th><th>Usuario</th><th>Pts</th><th>Exactos</th><th>Ganador</th></tr>`;
  ranking.forEach((u,i)=>{
    h+=`<tr ${u.name===currentUser?'class="current-user-row"':''}>
      <td>${i+1}</td><td>${esc(u.name)}</td><td><b>${u.total}</b></td><td>${u.exact}</td><td>${u.winner}</td>
    </tr>`;
  });
  h+=`</table></div>`;el.innerHTML=h;
}

// ADMIN (completo)
function renderAdmin(el){
  if(!isDesignatedAdmin(currentUser)){
    el.innerHTML=`<div class="section active"><div class="section-title">⚙️ Administración</div><p style="text-align:center;color:#999;padding:40px">No tienes permisos de administrador.</p></div>`;
    return;
  }
  let h=`<div class="section active admin-panel"><div class="section-title">⚙️ Panel de Administración</div>
<div class="admin-subtabs">
<button onclick="adminSubTab='results';renderContent()" class="${adminSubTab==='results'?'active':''}">📝 Resultados</button>
<button onclick="adminSubTab='users';renderContent()" class="${adminSubTab==='users'?'active':''}">👥 Usuarios</button>
<button onclick="adminSubTab='config';renderContent()" class="${adminSubTab==='config'?'active':''}">🎨 Personalizar</button>
<button onclick="adminSubTab='export';renderContent()" class="${adminSubTab==='export'?'active':''}">📦 Backup</button>
</div>`;

  if(adminSubTab==='results') h += renderAdminResults();
  else if(adminSubTab==='users') h += renderAdminUsers();
  else if(adminSubTab==='config') h += renderAdminConfig();
  else if(adminSubTab==='export') h += renderAdminExport();

  h+=`</div>`;el.innerHTML=h;
}
