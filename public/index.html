}

h+=''+fd(m.d)+' '+m.t+''+fl(m.h)+''+m.h+' vs '+fl(m.a)+''+m.a+'<input type="number" min="0" max="20" value="'+r.home+'" placeholder="-" class="ar" data-m="'+m.id+'" data-s="home" onfocus="this.select()">-<input type="number" min="0" max="20" value="'+r.away+'" placeholder="-" class="ar" data-m="'+m.id+'" data-s="away" onfocus="this.select()">'});
h+=''});
return h;
}

function saa(){
var res={};document.querySelectorAll('.ar').forEach(function(i){var v=i.value.trim();if(v!==''){var n=parseInt(v);if(isNaN(n)||n<0)n=0;if(n>20)n=20;v=n+''}if(!res[i.dataset.m])res[i.dataset.m]={home:'',away:''};res[i.dataset.m][i.dataset.s]=v});
API.post('/results',{results:res}).then(function(){cr=res;notify('✅ Guardados');rc()}).catch(function(e){notify('Error: '+e.message,'error')});
}

function clr(){if(!confirm('¿Borrar TODOS?'))return;API.del('/results').then(function(){cr={};notify('Borrados','info');rc()}).catch(function(e){notify('Error: '+e.message,'error')})}

function rAU(){
if(!cus.length)return Promise.resolve('Sin usuarios');
var proms=cus.map(function(u){return API.get('/admin/users/'+encodeURIComponent(u)+'/predictions').catch(function(){return{}})});
return Promise.all(proms).then(function(allP){
var h='<table class="user-mgmt-table"><tr><th>#</th><th>Usuario</th><th>Pronóst.</th><th>Pts</th><th>Acciones</th></tr>';
cus.forEach(function(u,i){var s=csf(allP[i]||{});var ic=u===cu;
h+='<tr'+(ic?' style="background:rgba(41,128,185,.08)"':'')+'><td>'+(i+1)+'</td><td><b>'+esc(u)+'</b>'+(ic?' (tú)':'')+'</td><td>'+s.predicted+'/'+TM+'</td><td><b>'+s.total+'</b></td><td><button class="btn-small btn-view" onclick="vu(\''+esc(u)+'\')">👁️</button><button class="btn-small btn-edit" onclick="eu(\''+esc(u)+'\')">✏️</button><button class="btn-small btn-reset" onclick="resu(\''+esc(u)+'\')">🔄</button><button class="btn-small btn-delete" onclick="du(\''+esc(u)+'\')">🗑️</button></td></tr>'});
h+='</table><button class="save-btn" onclick="au()">➕ Agregar</button><button class="danger-btn" onclick="dau()">⚠️ Eliminar Todos</button>';

});
}

function vu(u){
API.get('/admin/users/'+encodeURIComponent(u)+'/predictions').then(function(preds){
var sc=csf(preds);var rows='';
MA.forEach(function(m){var p=preds[m.id]||{home:'',away:''};var r=cr[m.id];var s=cs(p,r);var hp=p.home!==''&&p.away!=='';var b='';
if(r&&r.home!==''&&r.away!==''){if(hp){if(s.type==='exact')b='+3';else if(s.type==='winner')b='+1';else b='+0'}else b='—'}else b='⏳';
rows+='<tr><td>'+fl(m.h)+' vs '+fl(m.a)+'</td><td>'+(hp?p.home+'-'+p.away:'—')+'</td><td>'+(r&&r.home!==''?r.home+'-'+r.away:'—')+'</td><td>'+b+'</td></tr>'});
document.getElementById('modal-root').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>👁️ '+esc(u)+'</h3>'+sc.total+'Puntos'+sc.predicted+'/'+TM+'Pronósticos<table><tr><th>Partido</th><th>Pronóst.</th><th>Real</th><th>Pts</th></tr>'+rows+'</table>';
}).catch(function(e){notify('Error: '+e.message,'error')});
}

function eu(u){document.getElementById('modal-root').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>✏️ '+esc(u)+'</h3><label>Nombre:</label><input type="text" id="en" value="'+esc(u)+'" maxlength="20"><label>Contraseña:</label><input type="text" id="ep" placeholder="Nueva contraseña"><button class="btn-save" onclick="seu(\''+esc(u)+'\')">💾</button><button class="btn-cancel" onclick="closeModal()">Cancelar</button>'}

function seu(old){
var nn=(document.getElementById('en').value||'').trim(),np=document.getElementById('ep').value||'';
if(!nn||nn.length<2){notify('Mín 2','error');return}if(!np||np.length<3){notify('Mín 3','error');return}
API.put('/admin/users/'+encodeURIComponent(old),{newUsername:nn,newPassword:np}).then(function(){if(cu===old){cu=nn;sessionStorage.setItem('wu',nn)}closeModal();return loadUsers()}).then(function(){notify('Actualizado');rc()}).catch(function(e){notify('Error: '+e.message,'error')});
}

function resu(u){if(!confirm('¿Borrar pronósticos de "'+u+'"?'))return;var ids=MA.filter(function(m){return!hrr(m.id)}).map(function(m){return m.id});API.post('/admin/users/'+encodeURIComponent(u)+'/reset',{matchIds:ids}).then(function(){notify('Borrados','info');rc()}).catch(function(e){notify('Error: '+e.message,'error')})}

function du(u){if(!confirm('¿Eliminar "'+u+'"?'))return;API.del('/admin/users/'+encodeURIComponent(u)).then(function(){if(cu===u){cu=null;sessionStorage.removeItem('wu');ia=false;render();return}return loadUsers().then(function(){notify('Eliminado','info');rc()})}).catch(function(e){notify('Error: '+e.message,'error')})}

function au(){document.getElementById('modal-root').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>➕ Agregar</h3><label>Nombre:</label><input type="text" id="nn" maxlength="20"><label>Contraseña:</label><input type="text" id="np" maxlength="30"><button class="btn-save" onclick="snu()">Crear</button><button class="btn-cancel" onclick="closeModal()">Cancelar</button>'}

function snu(){var n=(document.getElementById('nn').value||'').trim(),p=document.getElementById('np').value||'';if(!n||n.length<2){notify('Mín 2','error');return}if(!p||p.length<3){notify('Mín 3','error');return}API.post('/admin/users',{username:n,password:p}).then(function(){closeModal();return loadUsers()}).then(function(){notify('"'+n+'" creado ✅');rc()}).catch(function(e){notify('Error: '+e.message,'error')})}

function dau(){if(!confirm('⚠️ ¿Eliminar TODOS?'))return;if(!confirm('¿Seguro?'))return;API.del('/admin/users').then(function(){cu=null;sessionStorage.removeItem('wu');ia=false;notify('Eliminados','info');render()}).catch(function(e){notify('Error: '+e.message,'error')})}

function rAC(){
var c=cc;
return '<h4 style="color:var(--primary)">🎨 Personalización</h4><label style="display:block;font-size:.85em;color:#555;font-weight:700;margin-top:10px">Nombre:</label><input type="text" id="cn" value="'+esc(c.companyName)+'" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px" maxlength="50"><label style="display:block;font-size:.85em;color:#555;font-weight:700;margin-top:12px">Logo URL:</label><input type="text" id="cl" value="'+esc(c.companyLogo||'')+'" placeholder="https://..." style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px"><label style="display:block;font-size:.85em;color:#555;font-weight:700;margin-top:8px">O subir:</label><input type="file" accept="image/*" onchange="hlu(this)" style="font-size:.85em"><label style="display:block;font-size:.85em;color:#555;font-weight:700;margin-top:15px">Colores:</label><input type="color" id="c1" value="'+c.primaryColor+'">Principal<input type="color" id="c2" value="'+c.primaryLight+'">Claro<input type="color" id="c3" value="'+c.primaryDark+'">Oscuro<input type="color" id="c4" value="'+c.accentColor+'">Acento<input type="color" id="c5" value="'+c.accentLight+'">Acento Claro'+esc(c.companyName||'Preview')+'<button class="save-btn" onclick="sac()">💾 Guardar</button><button class="danger-btn" onclick="rsc()">🔄 Reset</button>';
}

function hlu(i){var f=i.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){document.getElementById('cl').value=e.target.result;notify('Logo ✅')};r.readAsDataURL(f)}

function sac(){
var c={companyName:(document.getElementById('cn').value||'').trim(),companyLogo:(document.getElementById('cl').value||'').trim(),primaryColor:document.getElementById('c1').value,primaryLight:document.getElementById('c2').value,primaryDark:document.getElementById('c3').value,accentColor:document.getElementById('c4').value,accentLight:document.getElementById('c5').value};
API.post('/config',c).then(function(){cc=c;applyConfig(c);notify('Guardado ✅');render()}).catch(function(e){notify('Error: '+e.message,'error')});
}

function rsc(){if(!confirm('¿Restaurar?'))return;API.del('/config').then(function(c){cc=c;applyConfig(c);notify('Restaurado','info');render()}).catch(function(e){notify('Error: '+e.message,'error')})}

function rAE(){
return '<h4>📤 Exportar</h4><button class="save-btn" onclick="ej()">💾 JSON</button><button class="save-btn" onclick="et()">📄 TXT</button><button class="save-btn" onclick="ec()">📊 CSV</button><h4>📥 Importar</h4>⚠️ Reemplaza todo.<button class="info-btn">📂 JSON</button><input type="file" accept=".json" onchange="ij(this)">';
}

function ej(){API.get('/admin/export').then(function(d){dlf('prode_backup.json',JSON.stringify(d,null,2),'application/json');notify('Exportado ✅')}).catch(function(e){notify('Error: '+e.message,'error')})}

function ij(inp){var f=inp.files[0];if(!f)return;if(!confirm('⚠️ Reemplazar todo?'))return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);API.post('/admin/import',d).then(function(){cu=null;sessionStorage.removeItem('wu');ia=false;return loadAll()}).then(function(){notify('Importado ✅');render()}).catch(function(er){notify('Error: '+er.message,'error')})}catch(er){notify('JSON inválido','error')}};r.readAsText(f)}

function et(){API.get('/admin/export').then(function(d){var rk=d.users.map(function(u){var s=csf(d.predictions[u]||{});return{name:u,total:s.total,exact:s.exact}}).sort(function(a,b){return b.total-a.total});var t='PRODE MUNDIAL 2026\n'+new Date().toLocaleString()+'\n\nRANKING\n';rk.forEach(function(u,i){t+=(i+1)+'. '+u.name+' - '+u.total+' pts\n'});t+='\nRESULTADOS\n';MA.forEach(function(m){var r=d.results[m.id];t+=m.d+' '+m.h+' vs '+m.a+': '+(r&&r.home!==''?r.home+'-'+r.away:'Pend.')+'\n'});dlf('prode.txt',t,'text/plain');notify('TXT ✅')}).catch(function(e){notify('Error: '+e.message,'error')})}

function ec(){API.get('/admin/export').then(function(d){var csv='\uFEFFPos;Usuario;Pts;Exactos\n';var rk=d.users.map(function(u){var s=csf(d.predictions[u]||{});return{name:u,total:s.total,exact:s.exact}}).sort(function(a,b){return b.total-a.total});rk.forEach(function(u,i){csv+=(i+1)+';'+u.name+';'+u.total+';'+u.exact+'\n'});dlf('prode.csv',csv,'text/csv');notify('CSV ✅')}).catch(function(e){notify('Error: '+e.message,'error')})}

function dlf(n,c,t){var b=new Blob([c],{type:t});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
