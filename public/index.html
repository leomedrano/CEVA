<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prode SaaS</title>
</head>
<body>

<h2>PRODE SAAS</h2>

<input id="tenant" placeholder="empresa">
<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

<div id="app" style="display:none">
<div id="matches"></div>
<button onclick="save()">Guardar</button>
<ul id="ranking"></ul>
</div>

<script>
let token="", tenant="", predictions={};

const MATCHES=[
 {id:"1",home:"Argentina",away:"Brasil"},
 {id:"2",home:"España",away:"Francia"}
];

async function login(){
 tenant=document.getElementById("tenant").value;
 const user=document.getElementById("user").value;
 const pass=document.getElementById("pass").value;

 const res=await fetch('/api/login',{
  method:'POST',
  headers:{'Content-Type':'application/json','x-tenant':tenant},
  body:JSON.stringify({user,pass})
 });

 const data=await res.json();
 token=data.token;
 predictions=data.predictions||{};

 document.getElementById("app").style.display="block";
 render();
 loadRanking();
}

function render(){
 const div=document.getElementById("matches");
 div.innerHTML="";

 MATCHES.forEach(m=>{
  const val=predictions[m.id]||{home:0,away:0};

  div.innerHTML+=`
  <p>${m.home} vs ${m.away}
  <input value="${val.home}" onchange="upd('${m.id}','home',this.value)">
  -
  <input value="${val.away}" onchange="upd('${m.id}','away',this.value)">
  </p>`;
 });
}

function upd(id,t,v){
 if(!predictions[id]) predictions[id]={home:0,away:0};
 predictions[id][t]=Number(v);
}

async function save(){
 await fetch('/api/save',{
  method:'POST',
  headers:{
   'Content-Type':'application/json',
   'Authorization':token
  },
  body:JSON.stringify({predictions})
 });
 alert("Guardado");
}

async function loadRanking(){
 const res=await fetch('/api/ranking',{headers:{'x-tenant':tenant}});
 const data=await res.json();
 const ul=document.getElementById("ranking");
 ul.innerHTML="";
 data.forEach(r=>ul.innerHTML+=`<li>${r.user} - ${r.pts}</li>`);
}
</script>

</body>
</html>
